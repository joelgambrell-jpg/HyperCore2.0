<script>
(function(){

  const qs = new URLSearchParams(location.search);
  const eq = (qs.get("eq") || "").trim();

  function stepKey(id){
    return `nexus_${eq || "NO_EQ"}_step_${id}`;
  }

  function readJSON(k){
    try{ return JSON.parse(localStorage.getItem(k)||"null"); }catch(e){ return null; }
  }

  function isComplete(id){
    return localStorage.getItem(stepKey(id)) === "1";
  }

  function isCcsValid(){
    const summary = readJSON(`nexus_${eq||"NO_EQ"}_ccs_excel`);
    const signed = localStorage.getItem(`nexus_${eq||"NO_EQ"}_ccs_signed_off`) === "1";

    if (!summary) return false;
    if (!signed) return false;
    if ((summary.issueRows||0) > 0) return false;

    return true;
  }

  function systemReady(){
    return (
      isComplete("rif") &&
      isComplete("l2") &&
      isComplete("meg") &&
      isComplete("torque") &&
      isComplete("prefod") &&
      isComplete("fpv") &&
      isCcsValid()
    );
  }

  const lockLayer = document.getElementById("lockLayer");
  const pageCard = document.getElementById("pageCard");

  function enforceSystemLock(){
    const ready = systemReady();

    if (!ready){
      if (lockLayer) lockLayer.style.display = "flex";
      if (pageCard) pageCard.classList.add("page-locked");
    }
  }

  // run immediately
  enforceSystemLock();

  // re-check on focus/storage
  window.addEventListener("focus", enforceSystemLock);
  window.addEventListener("storage", enforceSystemLock);

})();
</script>
